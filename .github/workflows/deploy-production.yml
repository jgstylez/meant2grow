name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string
  release:
    types: [created]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify deployment confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ Deployment not confirmed. Please type 'deploy' to confirm."
            exit 1
          fi
          echo "✅ Deployment confirmed"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Install functions dependencies
        run: npm ci
        working-directory: ./functions
      
      - name: Build frontend (Production)
        run: npm run build:production
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.PROD_FIREBASE_VAPID_KEY }}
          VITE_FUNCTIONS_URL: ${{ secrets.PROD_FUNCTIONS_URL }}
          VITE_APP_URL: ${{ secrets.PROD_APP_URL }}
          VITE_MAILERSEND_API_TOKEN: ${{ secrets.PROD_MAILERSEND_API_TOKEN }}
          VITE_MAILERSEND_FROM_EMAIL: ${{ secrets.PROD_MAILERSEND_FROM_EMAIL }}
          VITE_MAILERSEND_REPLY_TO_EMAIL: ${{ secrets.PROD_MAILERSEND_REPLY_TO_EMAIL }}
          VITE_GIPHY_API_KEY: ${{ secrets.PROD_GIPHY_API_KEY }}
      
      - name: Build functions
        run: npm run build
        working-directory: ./functions
      
      - name: Setup Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Set Firebase project
        run: firebase use production --token ${{ secrets.FIREBASE_TOKEN_PRODUCTION }}
      
      - name: Waiting for approval
        run: |
          echo "⏸️  Deployment is waiting for approval from required reviewers..."
          echo "📧 Reviewers have been notified and can approve this deployment."
          echo "✅ Once approved, deployment will proceed automatically."
      
      - name: Deploy to Firebase (Production)
        run: |
          firebase deploy --only hosting,functions,firestore:rules,storage:rules --token ${{ secrets.FIREBASE_TOKEN_PRODUCTION }} --project ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_PRODUCTION }}
      
      - name: Create deployment summary
        if: success()
        run: |
          echo "## 🚀 Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Frontend deployed to Firebase Hosting" >> $GITHUB_STEP_SUMMARY
          echo "✅ Functions deployed to Cloud Functions" >> $GITHUB_STEP_SUMMARY
          echo "✅ Firestore rules deployed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Storage rules deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Production URL:** https://meant2grow.com" >> $GITHUB_STEP_SUMMARY
      
      - name: Post deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful"
          else
            echo "❌ Production deployment failed"
          fi
